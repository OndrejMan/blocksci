name: Build_second_arm

# Trigger the workflow when code is pushed to the main branch
on:
  workflow_run:
    workflows: ["Build_main_arm"] # This must match the 'name:' of the first workflow exactly
    types:
      - completed
    branches: 
      - master

# CRITICAL: Grant the workflow permission to read the repo and write to GHCR
permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: [self-hosted, ARM64]
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          submodules: recursive

      - name: Convert repository name to lowercase
        run: echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Ensure cache directory exists and is writable
        run: |
          # Use sudo if your runner user isn't root
          sudo chown -R $(whoami):$(id -gn) /cache || true
          # Create cache directory for ARM64 only
          mkdir -p "/cache/${{ github.workflow }}/.buildx-cache-arm64"
          
      # 1. Add QEMU to allow building for architectures other than the runner's
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 2. Set up Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.REPO_LC }}-complete
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha

      - name: Build and push ARM64
        id: build-arm64
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile_complete
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=local,src=/cache/${{ github.workflow }}/.buildx-cache-arm64
          cache-to: type=local,dest=/cache/${{ github.workflow }}/.buildx-cache-new-arm64,mode=max

      - name: Move cache
        run: |
          # Move ARM64 cache
          rm -rf "/cache/${{ github.workflow }}/.buildx-cache-arm64"
          mv "/cache/${{ github.workflow }}/.buildx-cache-new-arm64" "/cache/${{ github.workflow }}/.buildx-cache-arm64" || true
      
      - name: Trigger Custom Discord Alarm
        if: always()
        uses: OndrejMan/blocksci/.github/actions/discord-alarm@master
        with:
          webhook_url: ${{ secrets.DISCORD_WEBHOOK }}
          discord_id: ${{ secrets.DISCORD_ID}}