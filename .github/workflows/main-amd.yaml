name: Build_main_amd

on:
  push:
    branches:
      - master 

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: [self-hosted, X64]

    steps:
      - name: Ensure cache directory exists and is writable
        run: |
          # Use sudo if your runner user isn't root
          sudo chown -R $(whoami):$(id -gn) /cache || true
          # Create cache directory for amd64 architecture
          mkdir -p "/cache/${{ github.workflow }}/.buildx-cache-amd64"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Convert repository name to lowercase
        run: echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.REPO_LC }}-cj
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha

      - name: Build and push AMD64
        id: build-amd64
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NTHREADS=1
          cache-from: type=local,src=/cache/${{ github.workflow }}/.buildx-cache-amd64
          cache-to: type=local,dest=/cache/${{ github.workflow }}/.buildx-cache-new-amd64,mode=max

      - name: Move cache
        run: |
          # Move AMD64 cache
          rm -rf "/cache/${{ github.workflow }}/.buildx-cache-amd64"
          mv "/cache/${{ github.workflow }}/.buildx-cache-new-amd64" "/cache/${{ github.workflow }}/.buildx-cache-amd64" || true

      - name: Trigger Custom Discord Alarm
        if: always()
        uses: OndrejMan/blocksci/.github/actions/discord-alarm@master
        with:
          webhook_url: ${{ secrets.DISCORD_WEBHOOK }}
          discord_id: ${{ secrets.DISCORD_ID}}