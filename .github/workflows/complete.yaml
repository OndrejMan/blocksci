name: Build_second

# Trigger the workflow when code is pushed to the main branch
on:
  workflow_run:
    workflows: ["Build_main"] # This must match the 'name:' of the first workflow exactly
    types:
      - completed
    branches: 
      - master

# CRITICAL: Grant the workflow permission to read the repo and write to GHCR
permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: self-hosted
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          submodules: recursive

      - name: Convert repository name to lowercase
        run: echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Ensure cache directory exists and is writable
        run: |
          # Use sudo if your runner user isn't root
          sudo chown -R $(whoami):$(id -gn) /cache || true
          # Create separate cache directories for each architecture
          mkdir -p "/cache/${{ github.workflow }}/.buildx-cache-amd64"
          mkdir -p "/cache/${{ github.workflow }}/.buildx-cache-arm64"
          
      # 1. Add QEMU to allow building for architectures other than the runner's
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 2. Set up Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.REPO_LC }}-complete
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha

      - name: Build and push AMD64 (by digest)
        id: build-amd64
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile_complete
          platforms: linux/amd64
          labels: ${{ steps.meta.outputs.labels }}
          # Push by digest instead of tag to avoid overwriting
          outputs: type=image,name=ghcr.io/${{ env.REPO_LC }}-complete,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=local,src=/cache/${{ github.workflow }}/.buildx-cache-amd64
          cache-to: type=local,dest=/cache/${{ github.workflow }}/.buildx-cache-new-amd64,mode=max

      - name: Build and push ARM64 (by digest)
        id: build-arm64
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile_complete
          platforms: linux/arm64
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=ghcr.io/${{ env.REPO_LC }}-complete,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=local,src=/cache/${{ github.workflow }}/.buildx-cache-arm64
          cache-to: type=local,dest=/cache/${{ github.workflow }}/.buildx-cache-new-arm64,mode=max

      - name: Create and push multi-arch manifest
        run: |
          # Use the generated tags from the metadata action to stitch the digests together
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            ghcr.io/${{ env.REPO_LC }}-complete@${{ steps.build-amd64.outputs.digest }} \
            ghcr.io/${{ env.REPO_LC }}-complete@${{ steps.build-arm64.outputs.digest }}

      - name: Move cache
        run: |
          # Move AMD64 cache
          rm -rf "/cache/${{ github.workflow }}/.buildx-cache-amd64"
          mv "/cache/${{ github.workflow }}/.buildx-cache-new-amd64" "/cache/${{ github.workflow }}/.buildx-cache-amd64" || true

          # Move ARM64 cache
          rm -rf "/cache/${{ github.workflow }}/.buildx-cache-arm64"
          mv "/cache/${{ github.workflow }}/.buildx-cache-new-arm64" "/cache/${{ github.workflow }}/.buildx-cache-arm64" || true
      
      - name: Trigger Custom Discord Alarm
        if: always()
        uses: OndrejMan/blocksci/.github/actions/discord-alarm@master
        with:
          webhook_url: ${{ secrets.DISCORD_WEBHOOK }}
          discord_id: ${{ secrets.DISCORD_ID}}